<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-center mb-4 gap-2">
            <i class="bi bi-clipboard2-check fs-2 text-dark"></i>
            <h2 class="m-0">{{ title() }}</h2>
          </div>

          <div class="input-group mb-4">
            <input
              class="form-control"
              placeholder="Add a new task"
              [value]="newTodo()"
              (input)="newTodo.set($event.target.value)"
            />
            <button class="btn btn-primary" (click)="addTodo()">Add</button>
          </div>
<hr>
          <ul class="list-group">
            @for(todo of todos(); track $index) {
              <li class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                  <span class="fw-semibold me-2">{{ $index + 1 }}.</span>
                  <span
                    class="todo-text"
                    [class.text-decoration-line-through]="todo.done"
                    [class.text-muted]="todo.done"
                    (click)="toggleTodo($index)"
                  >
                    {{ todo.text }}
                  </span>
                </div>

                <div class="btn-group btn-group-sm" role="group">
                  <button class="btn btn-outline-success" (click)="toggleTodo($index)">
                    {{ todo.done ? 'Undo' : 'Done' }}
                  </button>
                  <button class="btn btn-outline-danger" (click)="deleteTodo($index)">Delete</button>
                </div>
              </li>
            }
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
